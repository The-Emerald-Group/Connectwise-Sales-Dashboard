<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectWise Sales Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23161616' stroke='%23222' stroke-width='4'/%3E%3Cpath d='M25 70 L45 50 L60 65 L80 35' fill='none' stroke='%234cd964' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='80' cy='35' r='6' fill='%234cd964'/%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { --crit: #ff3b30; --warn: #ffcc00; --good: #4cd964; --bg: #0a0a0a; --card-bg: #161616; --blue: #0a84ff; --purple: #bf5af2; --border: #222222; --text: #ffffff; --text-dim: #888888; --text-muted: #444444; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
  .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 10px; }
  .logo { font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: white; display: flex; align-items: center; gap: 30px; }
  .logo span { color: var(--good); }
  
  /* --- TIME CONTROLS UI --- */
  .time-controls { display: flex; align-items: center; gap: 15px; }
  .toggle-group { display: flex; background: #111; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
  .toggle-group button { background: none; border: none; color: #888; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; font-weight: bold; }
  .toggle-group button.active { background: #333; color: white; }
  .control-view select { background: #1a1a1a; color: white; border: 1px solid #333; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; outline: none;}
  .control-view select:hover { border-color: #555; }
  .control-view { display: flex; gap: 8px; }

  .last-harvest { text-align: right; }
  .last-harvest-time { font-size: 1.2rem; font-weight: bold; color: var(--good); }
  .last-harvest-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  
  .kpi-bar { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .kpi-card { flex: 1; min-width: 160px; background: var(--card-bg); border-radius: 8px; padding: 18px 20px; border-left: 8px solid; }
  .kpi-card.revenue { border-color: var(--good); }
  .kpi-card.profit  { border-color: var(--warn); }
  .kpi-card.margin  { border-color: var(--purple); }
  .kpi-card.hustle  { border-color: var(--blue); }
  .kpi-label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 8px; }
  .kpi-value { font-size: 2.2rem; font-weight: 800; line-height: 1; }
  .kpi-value.revenue { color: var(--good); }
  .kpi-value.profit  { color: var(--warn); }
  .kpi-value.margin  { color: var(--purple); }
  .kpi-value.hustle  { color: var(--blue); }
  .kpi-sub { font-size: .72rem; color: var(--text-muted); margin-top: 4px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; align-items: start; }
  .user-card { background: var(--card-bg); border-radius: 12px; padding: 20px; border-top: 2px solid #222;}
  .user-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .user-name { font-size: 1.1rem; font-weight: 700; }
  .user-revenue { font-size: 1.4rem; font-weight: 800; color: var(--good); }
  .finances { display: flex; justify-content: space-between; font-size: 0.75rem; color: #888; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px;}
  .stat-row { display: flex; gap: 12px; }
  .stat-box { flex: 1; border-radius: 8px; padding: 12px 14px; text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
  .stat-box .val { font-size: 1.4rem; font-weight: 800; color: white;}
  .stat-box .lbl { font-size: .65rem; text-transform: uppercase; color: var(--text-dim); }
  
  .toggle-orders-btn { background: rgba(255,255,255,0.02); border: none; color: #888; font-size: 0.75rem; cursor: pointer; width: 100%; margin-top: 18px; padding: 6px; border-radius: 4px; transition: 0.2s; }
  .toggle-orders-btn:hover { background: rgba(255,255,255,0.05); color: white; }
  .order-dropdown { display: none; margin-top: 10px; border-top: 1px solid #333; max-height: 220px; overflow-y: auto; padding-right: 5px;}
  .order-dropdown::-webkit-scrollbar { width: 6px; }
  .order-dropdown::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
  .order-dropdown::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
  
  .order-item { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 8px 0; border-bottom: 1px dashed #222; }
  .order-title { color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; font-weight: 600;}
  .order-profit { color: var(--warn); font-size: 0.65rem; }
  
  .chart-container { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 40px;}
  .chart-wrap { height: 260px; position: relative;}
  
  .loader { text-align: center; padding: 50px; color: var(--text-dim); font-size: 0.9rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;}
</style>
</head>
<body>
<div class="header-container">
  <div class="logo">
    ConnectWise <span>Sales Dashboard</span>
    
    <div class="time-controls">
      <div class="toggle-group">
        <button id="btn-rolling" class="active" onclick="setMode('rolling')">Rolling</button>
        <button id="btn-quarter" onclick="setMode('quarter')">Quarterly</button>
      </div>
      
      <div id="view-rolling" class="control-view">
        <select id="rollingDays" onchange="loadStats()">
          <option value="1">Last 24 Hours</option>
          <option value="7">Last 7 Days</option>
          <option value="30" selected>Last 30 Days</option>
          <option value="90">Last 90 Days</option>
          <option value="180">Last 6 Months</option>
          <option value="365">Last 1 Year</option>
        </select>
      </div>
      
      <div id="view-quarter" class="control-view" style="display:none;">
        <select id="quarterSelect" onchange="loadStats()">
          <option value="1">Q1 (Jan - Mar)</option>
          <option value="2">Q2 (Apr - Jun)</option>
          <option value="3">Q3 (Jul - Sep)</option>
          <option value="4">Q4 (Oct - Dec)</option>
        </select>
        <select id="yearSelect" onchange="loadStats()"></select>
      </div>
    </div>

  </div>
  <div class="last-harvest"><div class="last-harvest-time" id="last-harvest-time">—</div><div class="last-harvest-label">Dashboard View</div></div>
</div>

<div id="main-content"></div>

<script>
let trendChart = null;
let currentMode = 'rolling';

// Initialize Year Dropdown with the last 5 years
const yearSelect = document.getElementById('yearSelect');
const currentYear = new Date().getFullYear();
for (let i = 0; i < 5; i++) {
    const opt = document.createElement('option');
    opt.value = currentYear - i;
    opt.text = currentYear - i;
    yearSelect.appendChild(opt);
}

// Automatically select current quarter based on today's month
const currentMonth = new Date().getMonth(); // 0-11
const currentQ = Math.floor(currentMonth / 3) + 1;
document.getElementById('quarterSelect').value = currentQ.toString();

const formatMoney = (a) => new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', maximumFractionDigits: 0 }).format(a);

function toggleOrders(b) { 
    const d = b.nextElementSibling; 
    if (d.style.display === 'block') { d.style.display = 'none'; b.innerHTML = b.innerHTML.replace('▲', '▼'); } 
    else { d.style.display = 'block'; b.innerHTML = b.innerHTML.replace('▼', '▲'); } 
}

function setMode(mode) {
    currentMode = mode;
    if (mode === 'rolling') {
        document.getElementById('btn-rolling').classList.add('active');
        document.getElementById('btn-quarter').classList.remove('active');
        document.getElementById('view-rolling').style.display = 'flex';
        document.getElementById('view-quarter').style.display = 'none';
    } else {
        document.getElementById('btn-quarter').classList.add('active');
        document.getElementById('btn-rolling').classList.remove('active');
        document.getElementById('view-quarter').style.display = 'flex';
        document.getElementById('view-rolling').style.display = 'none';
    }
    loadStats();
}

async function loadStats() {
  let sinceStr, untilStr, label;

  if (currentMode === 'rolling') {
      const days = parseInt(document.getElementById('rollingDays').value);
      const now = new Date();
      const until = new Date(now);
      const since = new Date(now);
      since.setDate(since.getDate() - days);
      since.setHours(0,0,0,0);
      
      sinceStr = since.toISOString();
      untilStr = until.toISOString();
      label = days === 1 ? "Last 24 Hours" : `Last ${days} Days`;
  } else {
      const q = parseInt(document.getElementById('quarterSelect').value);
      const y = parseInt(document.getElementById('yearSelect').value);
      
      // Calculate precise UTC boundaries for the selected quarter
      const startMonth = (q - 1) * 3;
      const since = new Date(Date.UTC(y, startMonth, 1, 0, 0, 0));
      // Day 0 of next month gives us the last day of the current month
      const until = new Date(Date.UTC(y, startMonth + 3, 0, 23, 59, 59));
      
      sinceStr = since.toISOString();
      untilStr = until.toISOString();
      label = `Q${q} ${y}`;
  }

  try {
    const res = await fetch(`/api/sales-stats?since=${encodeURIComponent(sinceStr)}&until=${encodeURIComponent(untilStr)}&label=${encodeURIComponent(label)}`);
    
    // Handle the "Initial Sync" status elegantly
    if (res.status === 503) {
        document.getElementById('main-content').innerHTML = `
            <div class="loader">
                <div style="font-size:2rem; margin-bottom:10px;">🔄</div>
                Building Local Database...<br>
                <span style="font-size:0.7rem; color:#666; display:block; margin-top:10px; font-weight:normal;">Fetching historical records from ConnectWise API. This only happens once on boot. Retrying in 10s...</span>
            </div>`;
        setTimeout(loadStats, 10000); // Retry automatically
        return;
    }

    const data = await res.json();
    document.getElementById('last-harvest-time').textContent = new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
    const { totals, users, daily, timeframeLabel } = data;

    const kpiHTML = `
      <div class="kpi-bar">
        <div class="kpi-card revenue"><div class="kpi-label">Total Revenue</div><div class="kpi-value revenue">${formatMoney(totals.revenue)}</div><div class="kpi-sub">${timeframeLabel}</div></div>
        <div class="kpi-card profit"><div class="kpi-label">Est. Profit</div><div class="kpi-value profit">${formatMoney(totals.profit)}</div><div class="kpi-sub">Net Margin</div></div>
        <div class="kpi-card margin"><div class="kpi-label">Profit Margin</div><div class="kpi-value margin">${totals.margin}%</div><div class="kpi-sub">Overall Efficiency</div></div>
        <div class="kpi-card hustle"><div class="kpi-label">Sales Hustle</div><div class="kpi-value hustle">${totals.activities}</div><div class="kpi-sub">Total Activities</div></div>
      </div>`;

    if (users.length === 0) {
        document.getElementById('main-content').innerHTML = kpiHTML + `<div class="loader">No successful sales data found for ${timeframeLabel}.</div>`;
        return;
    }

    const userCards = users.map(u => `
      <div class="user-card">
        <div class="user-header"><div class="user-name">${u.name}</div><div class="user-revenue">${formatMoney(u.revenue)}</div></div>
        <div class="finances"><span>Cost: ${formatMoney(u.cost)}</span><span style="color:var(--warn); font-weight:bold;">Profit: ${formatMoney(u.profit)}</span></div>
        <div class="stat-row">
          <div class="stat-box"><div class="val">${u.won}</div><div class="lbl">Deals</div></div>
          <div class="stat-box"><div class="val">${u.profit_margin}%</div><div class="lbl">Margin</div></div>
          <div class="stat-box"><div class="val">${u.activities}</div><div class="lbl">Hustle</div></div>
        </div>
        <button class="toggle-orders-btn" onclick="toggleOrders(this)">View ${u.orders.length} Orders ▼</button>
        <div class="order-dropdown">${u.orders.map(o => `
          <div class="order-item">
            <div class="order-title" title="${o.title}">#${o.id}: ${o.title}</div>
            <div style="text-align:right;"><span style="color:var(--good); font-weight:bold;">${formatMoney(o.total)}</span><br><span class="order-profit">Profit: ${formatMoney(o.profit)}</span></div>
          </div>`).join('')}</div>
      </div>`).join('');

    document.getElementById('main-content').innerHTML = kpiHTML + `<div class="chart-container"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div><div class="grid">${userCards}</div>`;

    const ctx = document.getElementById('trendChart').getContext('2d');
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(ctx, { 
        type: 'line', 
        data: { 
            labels: daily.map(d => d.date), 
            datasets: [
                { label: 'Leads', data: daily.map(d => d.created), borderColor: 'rgba(10,132,255,0.8)', tension: 0.3, fill: true, backgroundColor: 'rgba(10,132,255,0.05)' },
                { label: 'Won', data: daily.map(d => d.won), borderColor: 'rgba(191,90,242,0.8)', tension: 0.3, fill: true, backgroundColor: 'rgba(191,90,242,0.05)' }
            ]
        }, 
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            scales: { 
                y: { beginAtZero: true, grid: { color: '#1e1e1e' }, ticks: { precision: 0 } }, 
                x: { grid: { display: false } } 
            } 
        } 
    });
  } catch(e) { 
      console.error(e); 
      document.getElementById('main-content').innerHTML = `<div class="loader" style="color:var(--crit)">API Error Occurred. Check console.</div>`;
  }
}

// Start auto-refresh for the UI (the backend will sync continuously on its own)
setInterval(loadStats, 30000);
loadStats();

</script>
</body>
</html>
