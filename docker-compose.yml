services:
  cw-sales-dashboard:
    image: samuelstreets/connectwise-sales-dashboard:latest
    container_name: Connectwise-Sales-Dashboard
    ports:
      - "5002:5000"

    volumes:
      - cw_sales_data:/data

    environment:
      # ── ConnectWise API credentials ────────────────────────────────────────
      - CW_SITE=api-eu.myconnectwise.net
      - CW_COMPANY=yourcompanyid
      - CW_PUBLIC_KEY=your_public_key_here
      - CW_PRIVATE_KEY=your_private_key_here
      - CW_CLIENT_ID=your_client_id_here

      # ── SSL verification ───────────────────────────────────────────────────
      - CW_VERIFY_SSL=true

      # ── Harvester Settings ─────────────────────────────────────────────────
      - CW_REFRESH_INTERVAL=300
      - SYNC_DAYS_BACK=730

    restart: unless-stopped
    healthcheck:
      # FIX: Ensure it explicitly pings 'http://localhost:5000/' 
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cw_sales_data:
